server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (FRNT-06)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # API reverse proxy (FRNT-03) with SSE passthrough (D-01, FRNT-04 superseded)
    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering so events stream immediately
        # Backend sends X-Accel-Buffering: no, but Nginx must also be configured
        proxy_buffering off;
        proxy_cache off;

        # Keep connections alive for long agent workflows
        proxy_read_timeout 300s;
    }

    # SPA fallback routing (FRNT-02)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
